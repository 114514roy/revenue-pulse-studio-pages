<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">AI-coded app revenue triage report preview</title>
  <desc id="desc">A stylized one-page report preview showing blocker category, screenshot notes, paywall diagnosis, and seven-day fix plan.</desc>
  <rect width="920" height="640" fill="#f7f8f5"/>
  <rect x="64" y="48" width="792" height="544" rx="18" fill="#ffffff" stroke="#171717" stroke-width="3"/>
  <text x="104" y="104" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800">AI-Coded App Revenue Triage</text>
  <text x="104" y="138" fill="#5d6168" font-family="Arial, Helvetica, sans-serif" font-size="18">One-page diagnosis for a stalled iOS app launch</text>

  <rect x="104" y="174" width="220" height="92" rx="10" fill="#e7f0eb" stroke="#d7ddd2"/>
  <text x="126" y="209" fill="#5d6168" font-family="Arial, Helvetica, sans-serif" font-size="15">Primary blocker</text>
  <text x="126" y="242" fill="#b9472f" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Paid boundary</text>

  <rect x="354" y="174" width="220" height="92" rx="10" fill="#ffffff" stroke="#d7ddd2"/>
  <text x="376" y="209" fill="#5d6168" font-family="Arial, Helvetica, sans-serif" font-size="15">Confidence</text>
  <text x="376" y="242" fill="#165a4a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Medium</text>

  <rect x="604" y="174" width="196" height="92" rx="10" fill="#ffffff" stroke="#d7ddd2"/>
  <text x="626" y="209" fill="#5d6168" font-family="Arial, Helvetica, sans-serif" font-size="15">Next test</text>
  <text x="626" y="242" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">7 days</text>

  <text x="104" y="318" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">Top problems</text>
  <circle cx="116" cy="354" r="5" fill="#b9472f"/>
  <text x="134" y="360" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="18">First screenshot shows UI, not the finished artifact.</text>
  <circle cx="116" cy="392" r="5" fill="#b9472f"/>
  <text x="134" y="398" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="18">Paid unlock says premium instead of naming a result.</text>
  <circle cx="116" cy="430" r="5" fill="#b9472f"/>
  <text x="134" y="436" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="18">Keyword wedge is too broad for App Store search.</text>

  <rect x="104" y="480" width="696" height="62" rx="10" fill="#165a4a"/>
  <text x="132" y="519" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Next: rewrite the paid artifact, then rebuild screenshot one.</text>
</svg>
